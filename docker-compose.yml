version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scooter
      POSTGRES_PASSWORD: scooter123
      POSTGRES_DB: scooter_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scooter -d scooter_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

